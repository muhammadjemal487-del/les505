<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Ethio Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f1f4f8;">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="About.html">ETHIO ACADEMY</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="About.html">About</a>
                <a class="nav-link" href="Course.html">Courses</a>
                <a class="nav-link active" href="Contact.html">Register</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="card shadow p-5 border-0 rounded-4">
            <h2 class="fw-bold mb-4">Student Registration</h2>
            <form id="regForm" enctype="multipart/form-data">
                <div class="row g-3">
                    <div class="col-md-6"><label>Full Name</label><input type="text" name="full_name" class="form-control" required></div>
                    <div class="col-md-6"><label>Email</label><input type="email" name="email" class="form-control" required></div>
                    <div class="col-md-4"><label>Age</label><input type="number" name="age" class="form-control" required></div>
                    <div class="col-md-4"><label>Stream</label>
                        <select name="stream" class="form-select">
                            <option>Computer Science</option>
                            <option>Natural Science</option>
                            <option>Social Science</option>
                        </select>
                    </div>
                    <div class="col-md-4"><label>National ID Photo</label><input type="file" name="national_id" class="form-control" required></div>
                    <div class="col-md-12"><button type="submit" class="btn btn-warning w-100 fw-bold">SUBMIT</button></div>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('regForm').onsubmit = function(e) {
            e.preventDefault();
            let formData = new FormData(this);
            formData.append('register', '1');
            fetch('admin.php', { method: 'POST', body: formData })
            .then(res => res.text())
            .then(data => { alert('Success!'); this.reset(); });
        };
    </script>
</body>
</html>
