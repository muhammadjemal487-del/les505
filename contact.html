<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - Ethio Excellence Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-bg: #0a192f; --accent-gold: #ffc107; --soft-white: #f1f4f8; }
        body { font-family: 'Poppins', sans-serif; background: var(--soft-white); }
        .contact-header { background: var(--primary-bg); color: white; padding: 60px 0; text-align: center; }
        .form-card { background: white; border-radius: 30px; padding: 40px; box-shadow: 0 15px 50px rgba(0,0,0,0.1); }
        .btn-gold { background: var(--accent-gold); font-weight: 800; border-radius: 50px; width: 100%; padding: 15px; border: none; }
    </style>
</head>
<body>
    <header class="contact-header">
        <h1 class="fw-bold">Student Admission</h1>
        <p>Register now to join our excellence track.</p>
    </header>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="form-card">
                    <form id="registrationForm">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label">Full Name</label><input type="text" name="full_name" class="form-control" required></div>
                            <div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" class="form-control" required></div>
                            <div class="col-md-4"><label class="form-label">Phone</label><input type="tel" name="phone" class="form-control" required></div>
                            <div class="col-md-4"><label class="form-label">Age</label><input type="number" name="age" class="form-control" required></div>
                            <div class="col-md-4"><label class="form-label">Gender</label><select name="gender" class="form-select"><option>Male</option><option>Female</option></select></div>
                            <div class="col-md-4"><label class="form-label">Grade</label><select name="grade" class="form-select"><option>Grade 9</option><option>Grade 10</option><option>Grade 11</option><option>Grade 12</option></select></div>
                            <div class="col-md-4"><label class="form-label">Stream</label><select name="stream" class="form-select"><option>Computer Science</option><option>Natural Science</option><option>Social Science</option></select></div>
                            <div class="col-md-4"><label class="form-label">Result (%)</label><input type="number" step="0.1" name="result_val" class="form-control" required></div>
                            <div class="col-md-12"><label class="form-label">National ID Photo</label><input type="file" name="national_id" class="form-control" accept="image/*" required></div>
                            <div class="col-md-12"><label class="form-label">Bio/Intro</label><textarea name="intro" class="form-control" rows="3"></textarea></div>
                        </div>
                        <button type="submit" class="btn btn-gold mt-4">SUBMIT REGISTRATION</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registrationForm').onsubmit = function (e) {
            e.preventDefault();
            let formData = new FormData(this);
            formData.append('register', '1');

            fetch('admin.php', { method: 'POST', body: formData })
                .then(res => res.text())
                .then(data => {
                    if (data.trim() === "success") {
                        alert('Success! Your registration has been submitted successfully.');
                        this.reset();
                    } else {
                        alert('Registration saved!');
                        this.reset();
                    }
                })
                .catch(err => alert('Error connecting to server.'));
        };
    </script>
</body>
</html>
